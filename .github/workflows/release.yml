name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ inputs.tag }}

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libssl-dev \
            libudev-dev \
            libusb-1.0-0-dev \
            pkg-config
      - name: Install Python build dependencies
        run: python -m pip install -e ".[build]"
      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
      - uses: actions/upload-artifact@v7
        with:
          name: linux-cli
          path: |
            build/bin/ggpatcher
            build/bin/steelpatcher
            build/bin/steelupdater
          if-no-files-found: error
          retention-days: 1

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Python build dependencies
        run: python -m pip install -e ".[build]"
      - name: Install static OpenSSL
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install `
            openssl:x64-windows-static
      - name: Build
        run: |
          cmake -S . -B build -A x64 `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static
          cmake --build build --config Release --parallel
      - name: Verify static OpenSSL linkage
        run: |
          $dependencies = & objdump -p build/bin/steelupdater.exe |
            Select-String "DLL Name"
          $dependencies
          if ($dependencies -match "libcrypto|libssl") {
            throw "steelupdater.exe has a dynamic OpenSSL dependency"
          }
      - uses: actions/upload-artifact@v7
        with:
          name: windows-cli
          path: |
            build/bin/ggpatcher.exe
            build/bin/steelpatcher.exe
            build/bin/steelupdater.exe
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: "*-cli"
          path: dist
          merge-multiple: true
      - name: Verify release assets
        run: |
          test -f dist/ggpatcher
          test -f dist/steelpatcher
          test -f dist/steelupdater
          test -f dist/ggpatcher.exe
          test -f dist/steelpatcher.exe
          test -f dist/steelupdater.exe
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 6
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(
            dist/ggpatcher
            dist/steelpatcher
            dist/steelupdater
            dist/ggpatcher.exe
            dist/steelpatcher.exe
            dist/steelupdater.exe
          )
          if gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --verify-tag --generate-notes --repo "$GITHUB_REPOSITORY"
          fi
          description='Files ending in `.exe` are Windows x86-64 executables. Files without an extension are Linux x86-64 executables.'
          notes=$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --json body --jq .body)
          if [[ "$notes" != *"$description"* ]]; then
            printf '%s\n\n%s\n' "$notes" "$description" \
              > "$RUNNER_TEMP/release-notes.md"
            gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
          fi
